<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Desa Banyuanyar</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-dark);
      color: white;
      padding: 24px 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      padding: 0 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }
    .sidebar-brand h2 { font-size: 1.2rem; color: white; display: flex; align-items: center; gap: 8px; }
    .sidebar-brand p { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
    
    .sidebar-nav { flex: 1; }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; color: rgba(255,255,255,0.6);
      font-size: 0.9rem; font-weight: 500;
      transition: all 0.2s ease;
    }
    .sidebar-link:hover, .sidebar-link.active {
      color: white; background: rgba(255,255,255,0.08);
      border-left: 3px solid var(--primary-light);
    }
    .sidebar-link .icon { font-size: 1.2rem; width: 24px; text-align: center; }
    
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1); }
    .sidebar-user { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    
    /* Main content */
    .admin-main { flex: 1; background: var(--bg-primary); overflow-y: auto; }
    .admin-header {
      background: white; padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header h1 { font-size: 1.4rem; }
    .admin-body { padding: 32px; }
    
    /* Stat cards */
    .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card {
      background: white; border-radius: 16px; padding: 24px;
      box-shadow: var(--shadow-card); border: 1px solid var(--border-light);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card .label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 800; color: var(--text-primary); }
    .stat-card .icon-bg {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 12px;
    }
    .stat-card .icon-bg.green { background: var(--primary-50); }
    .stat-card .icon-bg.blue { background: #E3F2FD; }
    .stat-card .icon-bg.purple { background: #F3E5F5; }
    
    /* Recent table */
    .admin-table-card {
      background: white; border-radius: 16px;
      box-shadow: var(--shadow-card); border: 1px solid var(--border-light);
      overflow: hidden;
    }
    .admin-table-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-table-header h3 { font-size: 1.05rem; }
    
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 24px; font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; color: var(--text-muted); background: var(--bg-primary);
      letter-spacing: 0.5px;
    }
    td { padding: 14px 24px; font-size: 0.9rem; border-top: 1px solid var(--border-light); }
    tr:hover td { background: #FAFBFC; }
    .td-name { font-weight: 600; color: var(--text-primary); }
    .badge-mandiri { background: #E3F2FD; color: #1565C0; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-induk { background: #F3E5F5; color: #6A1B9A; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    
    .action-btns { display: flex; gap: 6px; }
    .action-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .action-btn:hover { background: var(--bg-primary); }
    .action-btn.delete:hover { background: #FFF5F5; border-color: #E53E3E; }

    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; padding: 12px; overflow-x: auto; }
      .sidebar-brand { display: none; }
      .sidebar-footer { display: none; }
      .sidebar-nav { display: flex; gap: 4px; }
      .sidebar-link { padding: 8px 16px; white-space: nowrap; font-size: 0.8rem; border-left: none !important; border-radius: 8px; }
      .stat-cards { grid-template-columns: 1fr; }
      .admin-body { padding: 16px; }
      .admin-header { padding: 16px; }
      table { font-size: 0.8rem; }
      th, td { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>🌿 Banyuanyar</h2>
        <p>Panel Administrator</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link active">
          <span class="icon">📊</span> Dashboard
        </a>
        <a href="manage-umkm.html" class="sidebar-link">
          <span class="icon">🏪</span> Kelola UMKM
        </a>
        <a href="../index.html" class="sidebar-link">
          <span class="icon">🌐</span> Lihat Website
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="currentUser">👤 Admin</div>
        <button onclick="apiLogout()" class="btn btn-sm btn-secondary" style="width: 100%; font-size: 0.8rem;">
          🚪 Logout
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <a href="manage-umkm.html" class="btn btn-primary btn-sm">+ Tambah UMKM</a>
      </div>

      <div class="admin-body">
        <!-- Stats -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="icon-bg green">📊</div>
            <div class="label">Total UMKM</div>
            <div class="value" id="statTotal">-</div>
          </div>
          <div class="stat-card">
            <div class="icon-bg blue">🏠</div>
            <div class="label">UMKM Mandiri</div>
            <div class="value" id="statMandiri">-</div>
          </div>
          <div class="stat-card">
            <div class="icon-bg purple">🏢</div>
            <div class="label">UMKM Induk</div>
            <div class="value" id="statInduk">-</div>
          </div>
        </div>

        <!-- Recent UMKM Table -->
        <div class="admin-table-card">
          <div class="admin-table-header">
            <h3>📋 Data UMKM Terbaru</h3>
          </div>
          <div style="overflow-x: auto;">
            <table>
              <thead>
                <tr>
                  <th>No</th>
                  <th>Nama Produk</th>
                  <th>Kategori</th>
                  <th>Harga</th>
                  <th>Alamat</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="umkmTableBody">
                <tr><td colspan="6" style="text-align:center; color: var(--text-muted);">Memuat data...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // Auth guard
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
    }

    // Display current user
    const user = getCurrentUser();
    if (user) {
      document.getElementById('currentUser').textContent = '👤 ' + user.username;
    }

    // Load data
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Load stats
        const stats = await apiGetStats();
        document.getElementById('statTotal').textContent = stats.total_umkm;
        document.getElementById('statMandiri').textContent = stats.total_mandiri;
        document.getElementById('statInduk').textContent = stats.total_induk;
      } catch (err) {
        console.error('Error loading stats:', err);
      }

      try {
        // Load UMKM table
        const result = await apiGetUmkmList();
        const tbody = document.getElementById('umkmTableBody');
        
        if (result.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">Belum ada data UMKM.</td></tr>';
          return;
        }

        tbody.innerHTML = result.data.map((item, i) => `
          <tr>
            <td>${i + 1}</td>
            <td class="td-name">${item.nama_produk}</td>
            <td><span class="badge-${item.kategori.toLowerCase()}">${item.kategori}</span></td>
            <td>${item.harga || '-'}</td>
            <td>${item.alamat || '-'}</td>
            <td>
              <div class="action-btns">
                <button class="action-btn" onclick="window.location.href='manage-umkm.html?id=${item.id}'" title="Edit">✏️</button>
                <button class="action-btn delete" onclick="handleDelete(${item.id}, '${item.nama_produk}')" title="Hapus">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Error loading UMKM:', err);
        document.getElementById('umkmTableBody').innerHTML = 
          '<tr><td colspan="6" style="text-align:center; color: #E53E3E;">Gagal memuat data. Pastikan server berjalan.</td></tr>';
      }
    });

    async function handleDelete(id, nama) {
      if (!confirm(`Yakin ingin menghapus "${nama}"?`)) return;
      try {
        await apiDeleteUmkm(id);
        alert('UMKM berhasil dihapus!');
        location.reload();
      } catch (err) {
        alert('Gagal menghapus: ' + err.message);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tambah atau edit data UMKM Banyuwangi">
    <title>Form UMKM — Banyuangi Trip</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand" style="color: var(--text-primary);">🌿 Banyuangi Trip</a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Beranda</a>
                <a href="umkm.html">UMKM</a>
                <a href="peta.html">Peta</a>
                <a href="umkm-form.html" class="active">+ Tambah UMKM</a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span style="background: var(--text-primary);"></span>
                <span style="background: var(--text-primary);"></span>
                <span style="background: var(--text-primary);"></span>
            </button>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="container">
            <h1 id="formTitle">Tambah UMKM Baru</h1>
            <p id="formSubtitle">Daftarkan produk UMKM Anda agar dikenal lebih luas</p>
        </div>
    </div>

    <!-- FORM -->
    <section class="section" style="padding-top: 40px;">
        <div class="container">
            <div class="form-card fade-in">
                <form id="umkmForm">
                    <!-- Nama -->
                    <div class="form-group">
                        <label class="form-label" for="nama">Nama Produk / UMKM *</label>
                        <input type="text" class="form-input" id="nama" placeholder="Contoh: Kopi Robusta Banyuwangi"
                            required>
                    </div>

                    <!-- Harga & Jenis Produk -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="harga">Harga (Rp) *</label>
                            <input type="number" class="form-input" id="harga" placeholder="50000" min="0" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="jenisProduk">Jenis Produk *</label>
                            <select class="form-select" id="jenisProduk" required>
                                <option value="">Pilih jenis produk</option>
                                <option value="Makanan">🍽️ Makanan</option>
                                <option value="Minuman">☕ Minuman</option>
                                <option value="Kerajinan">🎨 Kerajinan</option>
                                <option value="Fashion">👗 Fashion</option>
                                <option value="Pertanian">🌾 Pertanian</option>
                                <option value="Jasa">🔧 Jasa</option>
                                <option value="Lainnya">📦 Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <!-- Deskripsi -->
                    <div class="form-group">
                        <label class="form-label" for="deskripsi">Deskripsi *</label>
                        <textarea class="form-textarea" id="deskripsi"
                            placeholder="Deskripsikan produk UMKM Anda secara detail..." required></textarea>
                    </div>

                    <!-- Keunggulan -->
                    <div class="form-group">
                        <label class="form-label" for="keunggulan">Keunggulan Produk *</label>
                        <textarea class="form-textarea" id="keunggulan"
                            placeholder="Apa yang membuat produk Anda berbeda dan unggul?" required
                            style="min-height: 80px;"></textarea>
                    </div>

                    <!-- Gambar -->
                    <div class="form-group">
                        <label class="form-label">Gambar Produk</label>
                        <div class="image-upload" id="imageUpload"
                            onclick="document.getElementById('gambarInput').click()">
                            <div class="icon">📷</div>
                            <p>Klik untuk upload gambar</p>
                            <p style="font-size: 0.8rem; color: var(--text-muted);">Format: JPG, PNG. Max 2MB</p>
                            <img id="imagePreview" class="image-preview" style="display: none;" alt="Preview">
                        </div>
                        <input type="file" id="gambarInput" accept="image/*" style="display: none;"
                            onchange="previewImage(event)">
                    </div>

                    <!-- Koordinat -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="lat">Latitude (opsional)</label>
                            <input type="number" class="form-input" id="lat" placeholder="-8.2192" step="any">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lng">Longitude (opsional)</label>
                            <input type="number" class="form-input" id="lng" placeholder="114.3691" step="any">
                        </div>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: -12px; margin-bottom: 20px;">
                        💡 Tip: Buka Google Maps, klik kanan pada lokasi, dan salin koordinatnya.
                    </p>

                    <!-- Buttons -->
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            💾 Simpan UMKM
                        </button>
                        <a href="umkm.html" class="btn btn-secondary btn-lg">← Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/umkm.js"></script>
    <script src="js/app.js"></script>
    <script>
        let editId = null;
        let imageData = 'images/umkm-default.png';

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            editId = params.get('id');

            if (editId) {
                // Edit mode
                const item = getUmkmById(editId);
                if (item) {
                    document.getElementById('formTitle').textContent = 'Edit UMKM';
                    document.getElementById('formSubtitle').textContent = 'Perbarui informasi produk UMKM Anda';
                    document.getElementById('submitBtn').textContent = '✅ Update UMKM';
                    document.title = `Edit ${item.nama} — Banyuangi Trip`;

                    // Fill form
                    document.getElementById('nama').value = item.nama;
                    document.getElementById('harga').value = item.harga;
                    document.getElementById('jenisProduk').value = item.jenisProduk;
                    document.getElementById('deskripsi').value = item.deskripsi;
                    document.getElementById('keunggulan').value = item.keunggulan;
                    document.getElementById('lat').value = item.lat || '';
                    document.getElementById('lng').value = item.lng || '';

                    if (item.gambar) {
                        imageData = item.gambar;
                        const preview = document.getElementById('imagePreview');
                        preview.src = item.gambar;
                        preview.style.display = 'block';
                    }
                }
            }

            // Form submit
            document.getElementById('umkmForm').addEventListener('submit', handleSubmit);
        });

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 2 * 1024 * 1024) {
                showToast('Ukuran gambar terlalu besar! Max 2MB.', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                imageData = e.target.result;
                const preview = document.getElementById('imagePreview');
                preview.src = imageData;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function handleSubmit(event) {
            event.preventDefault();

            const data = {
                nama: document.getElementById('nama').value.trim(),
                harga: parseInt(document.getElementById('harga').value),
                jenisProduk: document.getElementById('jenisProduk').value,
                deskripsi: document.getElementById('deskripsi').value.trim(),
                keunggulan: document.getElementById('keunggulan').value.trim(),
                gambar: imageData,
                lat: parseFloat(document.getElementById('lat').value) || -8.2192 + (Math.random() * 0.05 - 0.025),
                lng: parseFloat(document.getElementById('lng').value) || 114.3691 + (Math.random() * 0.05 - 0.025),
            };

            if (!data.nama || !data.harga || !data.jenisProduk || !data.deskripsi || !data.keunggulan) {
                showToast('Mohon lengkapi semua field yang wajib!', 'error');
                return;
            }

            if (editId) {
                updateUmkm(editId, data);
                showToast('UMKM berhasil diperbarui!', 'success');
            } else {
                createUmkm(data);
                showToast('UMKM berhasil ditambahkan!', 'success');
            }

            setTimeout(() => {
                window.location.href = 'umkm.html';
            }, 1000);
        }
    </script>
</body>

</html>
